{% extends 'base.html' %}

{% block title %}Registro{% endblock %}

{% block content %}
<section class="hero" style="max-width: 760px; margin: 0 auto;">
    <h1>Crear cuenta</h1>
    <p>Regístrate para empezar a controlar los minutos de juego de tus equipos.</p>
</section>

<section class="panel" style="max-width: 760px; margin: 24px auto 0;">
    <form method="post">
        <label>
            Nombre
            <input type="text" name="nombre" required placeholder="Tu nombre">
        </label>

        <label>
            Email
            <input type="email" name="email" required placeholder="tu@email.com">
        </label>

        <label>
            Contraseña
            <input type="password" name="password" required placeholder="Mínimo una contraseña segura">
        </label>

        <button type="submit">Crear cuenta</button>
    </form>

    <hr>

    <p style="margin:0;">
        ¿Ya tienes cuenta?
        <a href="{{ url_for('login') }}">Inicia sesión</a>
    </p>
</section>
{% endblock %}
