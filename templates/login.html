{% extends 'base.html' %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<section class="hero" style="max-width: 680px; margin: 0 auto;">
    <h1>Iniciar sesión</h1>
    <p>Accede a tu panel para gestionar equipos, jugadores, partidos y minutos.</p>
</section>

<section class="panel" style="max-width: 680px; margin: 24px auto 0;">
    <form method="post">
        <label>
            Email
            <input type="email" name="email" required placeholder="tu@email.com">
        </label>

        <label>
            Contraseña
            <input type="password" name="password" required placeholder="Tu contraseña">
        </label>

        <button type="submit">Entrar</button>
    </form>

    <hr>

    <p style="margin:0;">
        ¿No tienes cuenta?
        <a href="{{ url_for('registro') }}">Crear una cuenta</a>
    </p>
</section>
{% endblock %}
